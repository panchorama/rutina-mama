<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rutina de Mamá - TV Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FDF5F7">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root {
            /* Colores Base - Paleta Pastel Femenina */
            --bg-base: #FDF5F7;     
            --bg-panel: #FCE8ED;    
            --bg-card: #FFFFFF;     
            
            /* Textos */
            --text-main: #4A2B35;   
            --text-muted: #8C6A76;  
            
            /* Acentos */
            --primary: #F0A3C1;     
            --primary-focus: #D16B95; 
            --success: #6BB38B;     
            
            /* Tema Rutina 2 (Lavanda) */
            --routine2-primary: #CDB4DB;
            --routine2-focus: #A282B8;
            --routine2-bg: #F7F3FA;
            
            --radius: 16px;
            --focus-ring: 4px solid var(--primary-focus); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg-panel);
        }

        *:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 4px;
            border-radius: 12px;
            z-index: 50;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden; 
            flex-direction: row;
        }

        .sidebar {
            width: 340px;
            background-color: var(--bg-panel);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            border-right: 1px solid #F3D0DC;
            box-shadow: 4px 0 15px rgba(209, 107, 149, 0.1);
            z-index: 10;
        }

        .header-tv h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .header-tv p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .tv-calendar {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #F3D0DC;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .streak-tv {
            background: #FFE8D6;
            color: #D47A46;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #FAD1B6;
        }

        .grid-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day-header {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            border-radius: 50%;
            font-size: 14px;
            color: var(--text-muted);
            border: 1px solid #F0E3E8;
            transition: all 0.2s;
        }

        .day-cell.today {
            border: 2px solid var(--primary-focus);
            color: var(--primary-focus);
            background: #FFF5F8;
            font-weight: bold;
        }

        .day-cell.done {
            background: var(--success);
            color: white;
            font-weight: bold;
            border: none;
        }

        .btn-logrado {
            background: var(--success);
            color: white;
            border: none;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: auto;
            box-shadow: 0 4px 15px rgba(107, 179, 139, 0.4);
        }
        
        .btn-logrado:focus, .btn-logrado:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
            box-shadow: 0 6px 20px rgba(107, 179, 139, 0.6);
        }

        .btn-logrado.completed {
            background: #E2E8F0;
            color: #94A3B8;
            box-shadow: none;
        }

        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Separación mayor entre rutinas */
        }

        /* --- Estilos de Bloques de Rutina --- */
        .routine-module {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .routine-header h2 {
            font-size: 28px;
            color: var(--text-main);
        }
        
        .routine-header p {
            color: var(--text-muted);
            margin-top: 4px;
            font-size: 16px;
        }

        /* Botón Gigante (Hero) */
        .hero-button {
            width: 100%;
            border: none;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            border: 2px solid transparent;
        }

        /* Variantes de Color por Rutina */
        .theme-pink .hero-button {
            background: linear-gradient(135deg, #F3B3CE 0%, #DDA4D2 100%);
            box-shadow: 0 10px 25px rgba(216, 164, 210, 0.3);
        }
        .theme-pink .hero-button:focus, .theme-pink .hero-button:hover {
            transform: scale(1.02);
            border-color: #FFFFFF;
            box-shadow: 0 15px 35px rgba(216, 164, 210, 0.5);
        }
        .theme-pink .hero-play-icon { color: #DDA4D2; }

        .theme-lavender .hero-button {
            background: linear-gradient(135deg, #CDB4DB 0%, #B892FF 100%);
            box-shadow: 0 10px 25px rgba(184, 146, 255, 0.3);
        }
        .theme-lavender .hero-button:focus, .theme-lavender .hero-button:hover {
            transform: scale(1.02);
            border-color: #FFFFFF;
            box-shadow: 0 15px 35px rgba(184, 146, 255, 0.5);
        }
        .theme-lavender .hero-play-icon { color: #B892FF; }

        .hero-play-icon {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
            padding-left: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero-text h3 {
            color: #4A2B35;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .hero-text p {
            color: #6C4957;
            font-size: 16px;
        }

        /* Acordeón */
        .accordion-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid #F3D0DC;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        
        .theme-lavender .accordion-wrapper {
            border-color: #E2D4F0;
        }

        .btn-accordion-toggle {
            width: 100%;
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 20px 24px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-accordion-toggle:focus, .btn-accordion-toggle:hover {
            background: #FFF9FB;
        }

        .theme-lavender .btn-accordion-toggle:focus, .theme-lavender .btn-accordion-toggle:hover {
            background: #F9F6FC;
        }

        .accordion-icon {
            font-size: 16px;
            transition: transform 0.3s ease;
            color: var(--primary-focus);
        }
        
        .theme-lavender .accordion-icon { color: var(--routine2-focus); }

        .accordion-icon.open {
            transform: rotate(180deg);
        }

        .chapters-list {
            display: none; 
            flex-direction: column;
            gap: 2px;
            background: #FDF5F7;
            padding: 16px;
            border-top: 1px solid #F3D0DC;
        }
        
        .theme-lavender .chapters-list {
            background: var(--routine2-bg);
            border-top-color: #E2D4F0;
        }

        .chapters-list.open {
            display: flex;
        }

        /* Tarjetas de capítulos */
        .chapter-item {
            width: 100%;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .theme-pink .chapter-item:focus, .theme-pink .chapter-item:hover {
            background: #FFFFFF;
            border-color: var(--primary);
            transform: translateX(10px); 
            box-shadow: 0 4px 15px rgba(240, 163, 193, 0.2);
        }
        
        .theme-lavender .chapter-item:focus, .theme-lavender .chapter-item:hover {
            background: #FFFFFF;
            border-color: var(--routine2-primary);
            transform: translateX(10px); 
            box-shadow: 0 4px 15px rgba(205, 180, 219, 0.3);
        }

        .chapter-num-badge {
            background: #FDF5F7;
            color: var(--primary-focus);
            font-weight: 900;
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid #F3D0DC;
        }
        
        .theme-lavender .chapter-num-badge {
            background: var(--routine2-bg);
            color: var(--routine2-focus);
            border-color: #E2D4F0;
        }

        .chapter-info h4 {
            color: var(--text-main);
            font-size: 16px;
            margin-bottom: 2px;
        }

        .chapter-info span {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Reproductor Modal */
        .tv-player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            flex-direction: column;
        }

        .player-toolbar {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .btn-back-tv {
            background: var(--primary-focus);
            color: white;
            border: 2px solid transparent;
            padding: 12px 24px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }

        .btn-back-tv:focus, .btn-back-tv:hover {
            transform: scale(1.05);
            border-color: white;
            box-shadow: 0 4px 15px rgba(209, 107, 149, 0.4);
        }

        .player-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }

        .player-wrapper iframe {
            height: 85%;
            aspect-ratio: 16/9;
            max-width: 95%;
            background: #000;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="header-tv">
        <h1 id="tv-greeting">Hola, Mamá</h1>
        <p>Selecciona tu rutina de hoy</p>
    </div>

    <div class="tv-calendar">
        <div class="cal-header">
            <h3 id="cal-month-title">Mes</h3>
            <span class="streak-tv" id="streak-counter">🔥 0 días</span>
        </div>
        <div class="grid-days day-header">
            <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
        </div>
        <div class="grid-days" id="calendar-grid">
            <!-- Días renderizados por JS -->
        </div>
    </div>

    <button id="btn-action" class="btn-logrado" tabindex="0" onclick="triggerCompletion()">
        ¡Rutina Lista! ⭐
    </button>
</aside>

<main class="main-content">
    
    <!-- MÓDULO 1: Rutina de Rodillas (Original) -->
    <div class="routine-module theme-pink">
        <div class="routine-header">
            <h2>Rodillas Sanas (Fisioterapia)</h2>
            <p>Ejercicios suaves para articulaciones y equilibrio.</p>
        </div>

        <button class="hero-button" tabindex="0" onclick="playFullRoutine(1)">
            <div class="hero-play-icon">▶</div>
            <div class="hero-text">
                <h3>Iniciar Rutina 1</h3>
                <p>Clase completa de principio a fin (26 mins)</p>
            </div>
        </button>

        <div class="accordion-wrapper">
            <button class="btn-accordion-toggle" tabindex="0" onclick="toggleChapters('list1', 'icon1')">
                <span>Ver secciones individuales (Capítulos)</span>
                <span class="accordion-icon" id="icon1">▼</span>
            </button>
            <div class="chapters-list" id="list1">
                <!-- Capítulos inyectados por JS -->
            </div>
        </div>
    </div>

    <!-- MÓDULO 2: Rutina General de 30 mins (Nueva) -->
    <div class="routine-module theme-lavender">
        <div class="routine-header">
            <h2>Mantenimiento General (+70 años)</h2>
            <p>Rutina completa para todo el cuerpo en silla.</p>
        </div>

        <button class="hero-button" tabindex="0" onclick="playFullRoutine(2)">
            <div class="hero-play-icon">▶</div>
            <div class="hero-text">
                <h3>Iniciar Rutina 2</h3>
                <p>Clase completa de principio a fin (30 mins)</p>
            </div>
        </button>

        <div class="accordion-wrapper">
            <button class="btn-accordion-toggle" tabindex="0" onclick="toggleChapters('list2', 'icon2')">
                <span>Ver secciones individuales (Capítulos)</span>
                <span class="accordion-icon" id="icon2">▼</span>
            </button>
            <div class="chapters-list" id="list2">
                <!-- Capítulos inyectados por JS -->
            </div>
        </div>
    </div>

</main>

<div id="tv-player" class="tv-player-overlay">
    <div class="player-toolbar">
        <button id="btn-close-player" class="btn-back-tv" tabindex="0" onclick="closePlayer()">
            <span>&#10094;</span> Volver al Menú
        </button>
        <h2 id="now-playing-title" style="color: white; margin-right: 20px;">Cargando...</h2>
    </div>
    <div class="player-wrapper">
        <iframe id="youtube-iframe" src="" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    // --- DATOS DE LAS RUTINAS ---
    
    // Rutina 1: Rodillas
    const ROUTINE_1 = {
        videoId: "GVX3X-Hop2c",
        fullLength: 1602,
        exercises: [
            { id: 1, title: "Calentamiento de Tobillos", duration: "1 min", start: 71, end: 157 },
            { id: 2, title: "Aplastar pelota con pie (Cuádriceps)", duration: "3 min", start: 157, end: 331 },
            { id: 3, title: "Rodar balón y estirar pierna", duration: "3 min", start: 331, end: 521 },
            { id: 4, title: "Aplastar balón rodillas (Aductores)", duration: "2 min", start: 521, end: 639 },
            { id: 5, title: "Elevar pierna estirada con balón", duration: "3 min", start: 639, end: 827 },
            { id: 6, title: "Flexión cadera pierna estirada", duration: "2 min", start: 827, end: 941 },
            { id: 7, title: "Elevación de rodilla flexionada", duration: "2 min", start: 941, end: 1096 },
            { id: 8, title: "Transferencia de peso de pie", duration: "3 min", start: 1096, end: 1313 },
            { id: 9, title: "Pequeñas sentadillas en silla", duration: "2 min", start: 1313, end: 1425 },
            { id: 10, title: "Equilibrio a una pierna (Reto final)", duration: "2 min", start: 1425, end: 1557 }
        ]
    };

    // Rutina 2: General 30 mins
    const ROUTINE_2 = {
        videoId: "YDZ_RN0kH2Y",
        fullLength: 1881,
        exercises: [
            { id: 1, title: "Cuello: Empuje vertical con toalla", duration: "2 min", start: 162, end: 245 },
            { id: 2, title: "Cuello: Extensión posterior", duration: "1 min", start: 245, end: 336 },
            { id: 3, title: "Cuello: Inclinación lateral (Trapecio)", duration: "1 min", start: 336, end: 417 },
            { id: 4, title: "Hombros: Círculos hacia atrás/adelante", duration: "1 min", start: 417, end: 471 },
            { id: 5, title: "Brazos: Elevación frontal (Con o sin peso)", duration: "1 min", start: 471, end: 549 },
            { id: 6, title: "Hombros: Apertura lateral (Pájaro)", duration: "1 min", start: 549, end: 605 },
            { id: 7, title: "Muñecas: Movilidad y elevaciones", duration: "2 min", start: 605, end: 726 },
            { id: 8, title: "Espalda: Estiramiento lateral", duration: "2 min", start: 736, end: 861 },
            { id: 9, title: "Columna: Rotaciones lumbares", duration: "2 min", start: 861, end: 996 },
            { id: 10, title: "Columna: Extensión y Flexión (Pecho a rodillas)", duration: "2 min", start: 996, end: 1156 },
            { id: 11, title: "Caderas: Elevación de rodillas", duration: "1 min", start: 1156, end: 1250 },
            { id: 12, title: "Aductores: Aplastar toalla entre rodillas", duration: "1 min", start: 1250, end: 1333 },
            { id: 13, title: "Glúteo medio: Apertura lateral de pierna", duration: "1 min", start: 1333, end: 1448 },
            { id: 14, title: "Rodillas: Extensión de pierna (Cuádriceps)", duration: "1 min", start: 1448, end: 1558 },
            { id: 15, title: "Tobillos: Círculos pie elevado", duration: "1 min", start: 1558, end: 1606 },
            { id: 16, title: "De pie: Sentadillas apoyadas (45 grados)", duration: "1 min", start: 1606, end: 1675 },
            { id: 17, title: "De pie: Aperturas laterales de cadera", duration: "1 min", start: 1675, end: 1774 },
            { id: 18, title: "De pie: Balanceo puntas y talones", duration: "1 min", start: 1774, end: 1838 }
        ]
    };

    // --- ESTADO Y PERSISTENCIA ---
    let appState = {
        mamaName: 'Mamá',
        completedDays: []
    };

    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = String(today.getMonth() + 1).padStart(2, '0');
    const currentDay = String(today.getDate()).padStart(2, '0');
    const formattedToday = `${currentYear}-${currentMonth}-${currentDay}`;

    function loadData() {
        const saved = localStorage.getItem('tv_workout_state_v2');
        if (saved) {
            try { appState = { ...appState, ...JSON.parse(saved) }; } 
            catch (e) { console.error("Error", e); }
        }
    }

    function saveData() {
        localStorage.setItem('tv_workout_state_v2', JSON.stringify(appState));
    }

    // --- LÓGICA DE INTERFAZ ---

    function toggleChapters(listId, iconId) {
        const listContainer = document.getElementById(listId);
        const icon = document.getElementById(iconId);
        
        if (listContainer.classList.contains('open')) {
            listContainer.classList.remove('open');
            icon.classList.remove('open');
        } else {
            listContainer.classList.add('open');
            icon.classList.add('open');
        }
    }

    // Inyecta dinámicamente las listas de ejercicios para ambas rutinas
    function renderAllChapters() {
        // Renderizar Lista 1
        const container1 = document.getElementById('list1');
        ROUTINE_1.exercises.forEach((ex) => {
            container1.appendChild(createChapterButton(ex, ROUTINE_1.videoId, 1));
        });

        // Renderizar Lista 2
        const container2 = document.getElementById('list2');
        ROUTINE_2.exercises.forEach((ex) => {
            container2.appendChild(createChapterButton(ex, ROUTINE_2.videoId, 2));
        });
    }

    // Crea el botón HTML para un capítulo
    function createChapterButton(ex, videoId, routineNum) {
        const btn = document.createElement('button');
        btn.className = 'chapter-item';
        btn.tabIndex = 0; 
        
        const titleText = `Rutina ${routineNum} - Cap. ${ex.id}: ${ex.title}`;
        
        btn.onclick = () => openPlayer(titleText, videoId, ex.start, ex.end);
        btn.onkeydown = (e) => { if(e.key === 'Enter') openPlayer(titleText, videoId, ex.start, ex.end); };

        btn.innerHTML = `
            <div class="chapter-num-badge">${ex.id}</div>
            <div class="chapter-info">
                <h4>${ex.title}</h4>
                <span>⏱ ${ex.duration}</span>
            </div>
        `;
        return btn;
    }

    function playFullRoutine(routineNum) {
        if (routineNum === 1) {
            openPlayer("Rutina 1 Completa", ROUTINE_1.videoId, 0, ROUTINE_1.fullLength);
        } else {
            openPlayer("Rutina 2 Completa", ROUTINE_2.videoId, 0, ROUTINE_2.fullLength);
        }
    }

    // Reproductor Universal
    function openPlayer(title, videoId, startTime, endTime) {
        const modal = document.getElementById('tv-player');
        const iframe = document.getElementById('youtube-iframe');
        const titleEl = document.getElementById('now-playing-title');
        
        titleEl.innerText = title;
        
        const videoUrl = `https://www.youtube.com/embed/${videoId}?start=${startTime}&end=${endTime}&autoplay=1&rel=0&modestbranding=1`;
        iframe.src = videoUrl;
        
        modal.style.display = 'flex';
        document.getElementById('btn-close-player').focus();
    }

    function closePlayer() {
        const modal = document.getElementById('tv-player');
        const iframe = document.getElementById('youtube-iframe');
        
        iframe.src = ""; 
        modal.style.display = 'none';
        
        // Retornar foco general
        document.querySelector('.hero-button').focus();
    }

    // --- CALENDARIO Y SIDEBAR ---
    function renderSidebar() {
        const hrs = today.getHours();
        let greet = hrs < 12 ? "Buenos días" : hrs < 20 ? "Buenas tardes" : "Buenas noches";
        document.getElementById('tv-greeting').innerText = `¡${greet}, ${appState.mamaName}!`;

        const btn = document.getElementById('btn-action');
        if (appState.completedDays.includes(formattedToday)) {
            btn.innerText = "¡Día completado! 🌸";
            btn.classList.add('completed');
            btn.disabled = true;
        }

        const grid = document.getElementById('calendar-grid');
        const title = document.getElementById('cal-month-title');
        grid.innerHTML = '';

        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        title.innerText = `${monthNames[today.getMonth()]} ${currentYear}`;

        const firstDay = new Date(currentYear, today.getMonth(), 1).getDay();
        const totalDays = new Date(currentYear, today.getMonth() + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            grid.appendChild(empty);
        }

        let streak = 0; 
        
        for (let d = 1; d <= totalDays; d++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.innerText = d;

            const checkStr = `${currentYear}-${currentMonth}-${String(d).padStart(2,'0')}`;
            
            if (d === today.getDate()) cell.classList.add('today');
            if (appState.completedDays.includes(checkStr)) cell.classList.add('done');
            
            grid.appendChild(cell);
        }

        let tempDate = new Date(currentYear, today.getMonth(), today.getDate());
        const getStr = (dateObj) => `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
        
        let expected = getStr(tempDate);
        let yesterdayDate = new Date(tempDate);
        yesterdayDate.setDate(yesterdayDate.getDate() - 1);
        let yesterday = getStr(yesterdayDate);

        if (!appState.completedDays.includes(expected) && !appState.completedDays.includes(yesterday)) {
            streak = 0;
        } else {
            if(!appState.completedDays.includes(expected)) {
                tempDate.setDate(tempDate.getDate() - 1);
            }
            while(true) {
                if(appState.completedDays.includes(getStr(tempDate))) {
                    streak++;
                    tempDate.setDate(tempDate.getDate() - 1);
                } else {
                    break;
                }
            }
        }
        
        document.getElementById('streak-counter').innerText = `🔥 ${streak} días`;
    }

    function triggerCompletion() {
        if (!appState.completedDays.includes(formattedToday)) {
            appState.completedDays.push(formattedToday);
            saveData();
            renderSidebar();
            
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(440, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }
    }

    // Arranque Principal
    window.onload = () => {
        loadData();
        renderSidebar();
        renderAllChapters();
    };
</script>
</body>
</html>
